name: Excel to Markdown (All Sheets)

on:
  push:
    paths:
      - '**.xlsx'
  workflow_dispatch: 

jobs:
  convert:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.x'

      - name: Install dependencies
        run: pip install pandas openpyxl tabulate

      - name: Convert All Sheets to Markdown
        run: |
          python -c "
          import pandas as pd
          import glob
          import os

          # 全てのExcelファイルを検索
          for f in glob.glob('**/*.xlsx', recursive=True):
              base = os.path.splitext(f)[0]
              
              # Excelファイルを読み込み（sheet_name=Noneで全シート取得）
              excel_data = pd.read_excel(f, sheet_name=None)
              
              for sheet_name, df in excel_data.items():
                  # シート名を含んだファイル名を作成
                  md_filename = f'{base}_{sheet_name}.md'
                  
                  with open(md_filename, 'w', encoding='utf-8') as md_file:
                      md_file.write(f'# File: {f} / Sheet: {sheet_name}\n\n')
                      md_file.write(df.to_markdown(index=False))
                  print(f'Created: {md_filename}')
          "

      - name: Commit and Push Markdown
        run: |
          git config --global user.name "github-actions[bot]"
          git config --global user.email "github-actions[bot]@users.noreply.github.com"
          git add **/*.md
          git diff --staged --quiet || git commit -m "docs: [skip ci] auto-update markdown from all excel sheets"
          git push